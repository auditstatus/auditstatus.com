name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 21.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run linting
        run: npm run lint
        
      - name: Run tests
        run: npm test
        
      - name: Generate coverage report
        if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
        
      - name: Upload coverage to GitHub
        if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit --audit-level=moderate
        
      - name: Check for vulnerabilities
        run: npm audit --audit-level=high --production

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run integration tests
        run: |
          # Test PM2 ecosystem parsing
          node -e "
          const PM2Ecosystem = require('./lib/pm2-ecosystem');
          const fs = require('fs');
          
          // Create test ecosystem
          const testConfig = {
            apps: [{
              name: 'test-app',
              script: 'app.js',
              instances: 1,
              env: { NODE_ENV: 'development', PORT: 3000 },
              env_production: { NODE_ENV: 'production', PORT: 80 }
            }],
            deploy: {
              production: {
                user: 'deploy',
                host: 'test.example.com',
                path: '/var/www/app'
              }
            }
          };
          
          fs.writeFileSync('test-ecosystem.json', JSON.stringify(testConfig, null, 2));
          
          const ecosystem = new PM2Ecosystem('test-ecosystem.json', 'production');
          ecosystem.load().then(() => {
            const apps = ecosystem.getAppsWithEnvironment();
            console.log('✅ PM2 ecosystem parsing works');
            console.log('Apps:', apps.length);
            console.log('Environment resolved:', apps[0].env.NODE_ENV);
            
            const hosts = ecosystem.getDeploymentHosts();
            console.log('Deployment hosts:', hosts.length);
            
            fs.unlinkSync('test-ecosystem.json');
          }).catch(err => {
            console.error('❌ PM2 ecosystem test failed:', err);
            process.exit(1);
          });
          "
          
      - name: Test AuditStatus initialization
        run: |
          node -e "
          const AuditStatus = require('./lib/index');
          
          const auditStatus = new AuditStatus({
            timeout: 10000,
            retries: 2
          });
          
          console.log('✅ AuditStatus initialization works');
          console.log('Timeout:', auditStatus.options.timeout);
          console.log('Retries:', auditStatus.options.retries);
          console.log('Attestium available:', !!auditStatus.attestium);
          "

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [test, security, integration]
    if: always()
    
    steps:
      - name: Download test results
        uses: actions/download-artifact@v3
        with:
          name: test-results
          path: test-results/
        continue-on-error: true
        
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/**/*.xml
            test-results/**/*.json
        continue-on-error: true

