# What AuditStatus verifies with PM2:
# 1. All apps defined in ecosystem are running
# 2. Correct number of instances for each app
# 3. Apps are running with correct environment variables
# 4. Apps are bound to expected ports
# 5. Apps are running from correct working directories
# 6. No unexpected PM2 processes are running
# 7. Process execution modes match configuration (fork vs cluster)

