# PM2 Ecosystem Configuration Example
# This example shows how to configure AuditStatus to verify PM2-managed applications

servers:
  # PM2 Ecosystem Verification
  - name: production-web-cluster
    pm2:
      ecosystem: /path/to/ecosystem.config.js
      environment: production
    
  # PM2 with specific ecosystem file and environment
  - name: staging-api-servers
    pm2:
      ecosystem: ./config/staging-ecosystem.json
      environment: staging

  # PM2 with development environment (uses default env)
  - name: development-services
    pm2:
      ecosystem: /home/deploy/ecosystem.json
      # environment is optional, defaults to base 'env' configuration

